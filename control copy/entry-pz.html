<!DOCTYPE html>
<html>
    <head>
        <title>Control</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="main.css">
    </head>
    <body>
        <h1>Interior Motive</h1>
        <h2>Level 1</h2>
        <img src="entry-items/entryhint.png" class="solved">
        <button class="hint-btn">Hint</button>

        <div class="container">
            <div class="entry">
                <div class="dropzone" data-accept="plant1"
                    style="left: 270px; top: 375px; width: 100px; height: 200px;"></div>

                <div class="dropzone" data-accept="plant2"
                    style="left: 280px; top: 450px; width: 120px; height: 140px;"></div>

                <div class="dropzone" data-accept="window"
                    style="left: 780px; top: 325px; width: 50px; height: 50px;"></div>

                <div class="dropzone" data-accept="bowl"
                    style="left: 250px; top: 240px; width: 160px; height: 200px;"></div>

                <div class="dropzone" data-accept="coat"
                    style="left: 50px; top: 200px; width: 100px; height: 360px;"></div>

                <div class="dropzone" data-accept="chair"
                    style="left: 740px; top: 385px; width: 200px; height: 220px;"></div>

                <div class="dropzone" data-accept="pillow"
                    style="left: 850px; top: 430px; width: 70px; height: 70px;"></div>

                <div class="dropzone" data-accept="stool"
                    style="left: 150px; top: 465px; width: 120px; height: 120px;"></div>

                <div class="dropzone" data-accept="painting"
                    style="left: 180px; top: 200px; width: 180px; height: 220px;"></div>

                <div class="dropzone" data-accept="rug"
                    style="left: 335px; top: 480px; width: 300px; height: 220px;"></div>
            </div>

            <div class="toolbar">
                <img src="entry-items/plant1.png" class="item" data-type="plant1"/>
                 <img src="entry-items/plant2.png" class="item" data-type="plant2"/>
                <img src="entry-items/bowl.png" class="item" data-type="bowl"/>
                <img src="entry-items/coatrack.png" class="item" data-type="coat"/>
                <img src="entry-items/painting.png" class="item" data-type="painting"/>
                <img src="entry-items/rug.png" class="item" data-type="rug"/>
                <img src="entry-items/window.png" class="item" data-type="window"/>
                
            </div>

        </div>
        <div class="complete-popup">
            <div class="complete-box">
                <div class="complete-icon">✓</div>
                <h2>Complete!</h2>
                <p>You placed all the items.</p>
                <button class="close-btn">Close</button>
            </div>
        </div>

        <script src="jquery-4.0.0.min.js"></script>
        <script src="jquery-ui.min.js"></script>
        <script src="main.js"></script>
    </body>
</html>
