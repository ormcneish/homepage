<!DOCTYPE html>
<html>
    <head>
        <title>Level 6</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="main.css">
    </head>
    <body>   
       <h1>Interior Motive</h1>
        <h2>Level 6</h2>

        <img src="bed-items/bedhint.png" class="solved">
        <button class="hint-btn">Hint</button>
        
        <div class="container">
            <div class="bed">
                <div class="dropzone" data-accept="bear"
                    style="left: 850px; top: 215px; width: 50px; height: 70px;"></div>

                <div class="dropzone" data-accept="books-1"
                    style="left: 700px; top: 370px; width: 40px; height: 50px;"></div>

                <div class="dropzone" data-accept="books-2"
                    style="left: 813px; top: 240px; width: 35px; height: 43px;"></div>

                <div class="dropzone" data-accept="clock"
                    style="left: 628px; top: 251px; width: 30px; height: 30px;"></div>

                <div class="dropzone" data-accept="tank"
                    style="left: 810px; top: 360px; width: 70px; height: 70px;"></div>

                <div class="dropzone" data-accept="laptop"
                    style="left: 590px; top: 353px; width: 90px; height: 70px;"></div>

                <div class="dropzone" data-accept="painting"
                    style="left: 350px; top: 210px; width: 190px; height: 150px;"></div>

                <div class="dropzone" data-accept="plant1"
                    style="left: 520px; top: 348px; width: 60px; height: 70px;"></div>

                <div class="dropzone" data-accept="plant2"
                    style="left: 680px; top: 228px; width: 40px; height: 55px;"></div>

                <div class="dropzone" data-accept="stool"
                    style="left: 600px; top: 450px; width: 70px; height: 90px;"></div>
            </div>

            <div class="toolbar">
                <img src="bed-items/bear.png" class="item" data-type="bear"/>
                <img src="bed-items/books-1.png" class="item" data-type="books-1"/>
                <img src="bed-items/books-2.png" class="item" data-type="books-2"/>
                <img src="bed-items/clock.png" class="item" data-type="clock"/>
                <img src="bed-items/fishtank.png" class="item" data-type="tank"/>
                <img src="bed-items/laptop.png" class="item" data-type="laptop"/>
                <img src="bed-items/painting.png" class="item" data-type="painting"/>
                <img src="bed-items/plant1.png" class="item" data-type="plant1"/>
                <img src="bed-items/plant2.png" class="item" data-type="plant2"/>
                <img src="bed-items/stool.png" class="item" data-type="stool"/>
            </div>

        </div>
        <div class="complete-popup">
            <div class="complete-box">
                <div class="complete-icon">✓</div>
                <h2>Complete!</h2>
                <p>You placed all the items.</p>
                <button class="close-btn">Close</button>
            </div>
        </div>

        <script src="jquery-4.0.0.min.js"></script>
        <script src="jquery-ui.min.js"></script>
        <script src="main.js"></script>
    </body>
</html>
