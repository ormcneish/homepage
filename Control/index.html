<!DOCTYPE html>
<html>
    <head>
        <title>Control</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="main.css">
    </head>
    <body>
        <img src="room.jpg" class="solved">
        <button class="hint-btn">Hint</button>

        <div class="container">
            <div class="room">
                <div class="dropzone" data-accept="plant1"
                    style="left: 170px; top: 320px; width: 80px; height: 150px;"></div>

                <div class="dropzone" data-accept="plant2"
                    style="left: 280px; top: 450px; width: 120px; height: 140px;"></div>

                <div class="dropzone" data-accept="plant3"
                    style="left: 780px; top: 325px; width: 50px; height: 50px;"></div>

                <div class="dropzone" data-accept="picture"
                    style="left: 250px; top: 240px; width: 160px; height: 200px;"></div>

                <div class="dropzone" data-accept="window"
                    style="left: 760px; top: 230px; width: 160px; height: 160px;"></div>

                <div class="dropzone" data-accept="chair"
                    style="left: 740px; top: 385px; width: 200px; height: 220px;"></div>

                <div class="dropzone" data-accept="pillow"
                    style="left: 850px; top: 430px; width: 70px; height: 70px;"></div>

                <div class="dropzone" data-accept="stool"
                    style="left: 150px; top: 465px; width: 120px; height: 120px;"></div>

                <div class="dropzone" data-accept="door"
                    style="left: 460px; top: 240px; width: 200px; height: 350px;"></div>

                <div class="dropzone" data-accept="rug"
                    style="left: 470px; top: 525px; width: 200px; height: 120px;"></div>
            </div>

            <div class="toolbar">
                <img src="plant1.png" class="item" data-type="plant1"/>
                <img src="plant2.png" class="item" data-type="plant2"/>
                <img src="plant3.png" class="item" data-type="plant3"/>
                <img src="picture.png" class="item" data-type="picture"/>
                <img src="window.png" class="item" data-type="window"/>
                <img src="chair.png" class="item" data-type="chair"/>
                <img src="pillow.png" class="item" data-type="pillow"/>
                <img src="stool.png" class="item" data-type="stool"/>
                <img src="door.png" class="item" data-type="door"/>
                <img src="rug.png" class="item" data-type="rug"/>
            </div>

        </div>

        <script src="jquery-4.0.0.min.js"></script>
        <script src="jquery-ui.min.js"></script>
        <script src="main.js"></script>
    </body>
</html>
